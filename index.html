<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loup-Garou</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#0a0a1a;--abyss:#0d0d24;--purple:#1a0a2e;--blood:#8b0000;
  --blood-glow:#b91c1c;--moon:#d4a017;--moon-pale:#e8c44a;
  --ghost:#e8e8e8;--fog:rgba(232,232,232,.07);--green:#10b981;--red:#ef4444;
}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--void);color:var(--ghost);line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--void)}::-webkit-scrollbar-thumb{background:var(--moon);border-radius:3px}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--void);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
#loginScreen.hidden{display:none}
.login-box{background:var(--abyss);border:1px solid var(--moon);border-radius:10px;padding:2rem;width:100%;max-width:400px;text-align:center;box-shadow:0 0 40px rgba(212,160,23,.18)}
.login-box h1{font-family:'Cinzel Decorative',serif;font-size:2.2rem;color:var(--moon);margin-bottom:.5rem}
.login-box p{color:var(--ghost);margin-bottom:1.4rem;font-size:.95rem;opacity:.85}
.fg{margin-bottom:1.1rem;text-align:left}
.fg label{display:block;margin-bottom:.35rem;color:var(--moon);font-weight:600;font-size:.9rem}
.fg input{width:100%;padding:.75rem;background:var(--purple);border:1px solid var(--moon);color:var(--ghost);border-radius:5px;font-family:inherit;font-size:1rem}
.fg input:focus{outline:none;border-color:var(--moon-pale);box-shadow:0 0 8px rgba(212,160,23,.3)}
.btn{padding:.75rem 1.8rem;background:var(--blood-glow);color:var(--ghost);border:none;border-radius:5px;cursor:pointer;font-weight:700;transition:.25s;font-size:.95rem;font-family:inherit;letter-spacing:.03em}
.btn:hover{background:var(--blood);box-shadow:0 0 18px rgba(139,0,0,.5)}
.btn-secondary{background:var(--purple);border:1px solid var(--moon)}
.btn-secondary:hover{background:var(--moon);color:var(--void)}
.lang-bar{position:absolute;top:.8rem;right:.8rem;display:flex;gap:.4rem;z-index:200}
.lb{padding:.4rem .9rem;background:var(--purple);border:1px solid var(--moon);color:var(--ghost);cursor:pointer;border-radius:4px;font-family:inherit;font-size:.82rem;transition:.2s}
.lb.active{background:var(--moon);color:var(--void);font-weight:700}
.room-code-display{margin-top:1rem;padding:.8rem;background:var(--purple);border:1px solid var(--moon-pale);border-radius:6px;display:none}
.room-code-display .code{font-family:'Cinzel',serif;font-size:2rem;color:var(--moon-pale);letter-spacing:.25em}
.room-code-display small{display:block;font-size:.78rem;opacity:.7;margin-top:.2rem}

/* ── GAME SCREEN ── */
#gameScreen{position:fixed;inset:0;background:var(--void);z-index:99;display:flex;flex-direction:column}
#gameScreen.hidden{display:none}
.g-header{padding:.7rem 1rem;background:rgba(10,10,26,.96);border-bottom:1px solid var(--moon);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem}
.g-title{font-family:'Cinzel Decorative',serif;color:var(--moon);font-size:1.15rem}
.g-meta{display:flex;gap:1.2rem;font-size:.82rem;flex-wrap:wrap;align-items:center}
.g-meta span{color:var(--moon-pale);font-weight:600}
.leave-btn{padding:.3rem .8rem;background:transparent;border:1px solid var(--blood-glow);color:var(--blood-glow);border-radius:4px;cursor:pointer;font-family:inherit;font-size:.8rem;transition:.2s}
.leave-btn:hover{background:var(--blood-glow);color:#fff}
.g-content{flex:1;overflow:hidden;display:flex;gap:1rem;padding:1rem}

/* Left panel */
.left-panel{flex:0 0 240px;background:var(--abyss);border:1px solid var(--moon);border-radius:8px;padding:1.2rem;display:flex;flex-direction:column;gap:.5rem;overflow-y:auto}
.left-panel h3{color:var(--moon);font-family:'Cinzel',serif;font-size:.95rem;margin-bottom:.3rem}
.irow{display:flex;justify-content:space-between;font-size:.85rem;padding:.35rem 0;border-bottom:1px solid var(--fog)}
.irow strong{color:var(--moon-pale)}
.role-card{margin-top:.8rem;padding:.9rem;background:var(--purple);border:1px solid var(--moon);border-radius:6px;text-align:center}
.role-card .re{font-size:2.4rem;margin-bottom:.3rem}
.role-card .rn{color:var(--moon-pale);font-weight:700;font-size:1rem;margin-bottom:.4rem}
.role-card .rd{font-size:.78rem;color:var(--ghost);opacity:.85;line-height:1.4}

/* Center */
.center-panel{flex:1;background:var(--abyss);border:1px solid var(--moon);border-radius:8px;padding:1.5rem;overflow-y:auto;display:flex;flex-direction:column}

/* Setup */
.setup-wrap{width:100%}
.setup-wrap h2{color:var(--moon);font-family:'Cinzel',serif;margin-bottom:1.2rem;font-size:1.15rem}
.s-section{margin-bottom:1.4rem;padding-bottom:1.2rem;border-bottom:1px solid var(--fog)}
.s-section h4{color:var(--moon-pale);margin-bottom:.7rem;font-size:.9rem}
.s-section input[type=number]{padding:.45rem .6rem;background:var(--purple);border:1px solid var(--moon);color:var(--ghost);border-radius:4px;font-family:inherit;font-size:.95rem;width:90px}
.timer-row{display:flex;gap:2rem;flex-wrap:wrap}
.timer-row>div{display:flex;flex-direction:column;gap:.4rem}
/* Roles grid */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:.38rem;max-height:380px;overflow-y:auto;padding:.3rem}
.rc{display:flex;align-items:center;gap:.5rem;padding:.42rem .6rem;background:var(--purple);border:1px solid transparent;border-radius:4px;cursor:pointer;font-size:.84rem;transition:.15s;user-select:none}
.rc:hover{border-color:var(--moon)}
.rc input{width:15px;height:15px;accent-color:var(--blood-glow);cursor:pointer;flex-shrink:0}
.rc.t-village{border-left:3px solid var(--green)}
.rc.t-werewolf{border-left:3px solid var(--blood-glow)}
.rc.t-solo{border-left:3px solid var(--moon)}
.rc.t-village:hover{border-color:var(--green)}
.rc.t-werewolf:hover{border-color:var(--blood-glow)}
.rc.t-solo:hover{border-color:var(--moon-pale)}
.rc-emoji{font-size:1.05rem;flex-shrink:0}
.waiting-msg{text-align:center;color:var(--moon);margin-top:1rem;font-size:1rem;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Gameplay */
.play-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;text-align:center}
.phase-title{font-family:'Cinzel Decorative',serif;font-size:2rem;color:var(--moon-pale);margin-bottom:.6rem}
.phase-desc{color:var(--ghost);margin-bottom:1.2rem;font-size:1rem;opacity:.9}
.phase-timer{font-family:'Cinzel',serif;font-size:2.8rem;color:var(--blood-glow);margin-bottom:1rem;animation:pulse 1.5s infinite}
.player-list{margin-top:1.2rem;width:100%;max-width:520px;text-align:left}
.pi{display:flex;align-items:center;gap:.7rem;padding:.6rem .8rem;background:var(--purple);border:1px solid var(--moon);border-radius:4px;margin-bottom:.35rem;font-size:.88rem}
.pstatus{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pstatus.alive{background:var(--green)}
.pstatus.dead{background:var(--red)}

/* Right chat */
.right-panel{flex:0 0 210px;background:var(--abyss);border:1px solid var(--moon);border-radius:8px;padding:1.1rem;display:flex;flex-direction:column}
.chat-hdr{color:var(--moon);font-family:'Cinzel',serif;font-size:.95rem;margin-bottom:.7rem}
.chat-msgs{flex:1;overflow-y:auto;margin-bottom:.7rem;min-height:60px}
.cm{margin-bottom:.55rem;padding:.42rem .55rem;background:var(--purple);border-left:3px solid var(--moon);border-radius:2px;font-size:.8rem}
.cm .cn{color:var(--moon-pale);font-weight:700}
.cm .ct{color:var(--ghost);margin-top:.15rem}
.chat-inp{display:flex;gap:.35rem}
.chat-inp input{flex:1;padding:.45rem;background:var(--purple);border:1px solid var(--moon);color:var(--ghost);border-radius:3px;font-family:inherit;font-size:.82rem}
.chat-inp button{padding:.45rem .7rem;background:var(--blood-glow);border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:.85rem}

/* Chat tabs */
.chat-tabs{display:flex;gap:.25rem;margin-bottom:.5rem;flex-wrap:wrap}
.chat-tab{padding:.25rem .55rem;background:var(--purple);border:1px solid var(--moon);color:var(--ghost);border-radius:3px;cursor:pointer;font-family:inherit;font-size:.72rem;transition:.15s}
.chat-tab.active{background:var(--moon);color:var(--void);font-weight:700}
.chat-tab .unread{background:var(--blood-glow);color:#fff;border-radius:50%;padding:0 .3rem;font-size:.65rem;margin-left:.2rem}

/* Maire */
.maire-bar{margin-bottom:.8rem;padding:.7rem;background:var(--purple);border:1px solid var(--moon);border-radius:6px;text-align:center}
.maire-bar .maire-title{color:var(--moon-pale);font-family:'Cinzel',serif;font-size:.9rem;margin-bottom:.4rem}
.maire-bar .maire-name{color:var(--moon);font-weight:700;font-size:1rem}
.candidate-list{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:.4rem}
.vote-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 1px;vertical-align:middle;border:1px solid rgba(255,255,255,.2)}
.voter-legend{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:.5rem;font-size:.72rem}
.voter-legend span{display:flex;align-items:center;gap:.2rem}
.candidate-card{display:inline-flex;flex-direction:column;align-items:center;background:var(--abyss);border:1px solid var(--moon);border-radius:6px;padding:.4rem .7rem;min-width:80px}
.candidate-card .c-name{font-weight:700;font-size:.82rem;color:var(--moon-pale)}
.candidate-card .c-votes{font-size:.72rem;margin-top:.2rem}
.slots-info{font-size:.72rem;opacity:.6;margin-top:.2rem}

@media(max-width:820px){
  .g-content{flex-direction:column}
  .left-panel,.right-panel{flex:none}
  .roles-grid{max-height:260px}
}

/* ── DEATH ANIMATION OVERLAY ── */
#deathOverlay{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0);pointer-events:none}
#deathOverlay.active{display:flex;pointer-events:all;animation:deathBgIn .6s ease forwards}
@keyframes deathBgIn{to{background:rgba(0,0,0,.85)}}
.death-card{text-align:center;transform:scale(0);opacity:0;animation:deathCardIn .7s .3s ease forwards}
@keyframes deathCardIn{to{transform:scale(1);opacity:1}}
.death-card h2{color:var(--blood-glow);font-family:'Cinzel Decorative',serif;font-size:3rem;margin-bottom:.5rem}
.death-card .role{color:var(--moon-pale);font-size:2.2rem;margin:.5rem 0}
.death-card .msg{color:var(--ghost);font-size:1.1rem;margin-top:.8rem}
.death-card .ok-btn{margin-top:1.5rem;padding:.7rem 1.5rem;background:var(--blood-glow);border:none;color:#fff;border-radius:5px;cursor:pointer;font-weight:700;transition:.2s;font-family:inherit}
.death-card .ok-btn:hover{background:var(--blood)}
</style>
</head>

<body>
<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="lang-bar">
    <button class="lb active" onclick="setLang('en')">EN</button>
    <button class="lb" onclick="setLang('fr')">FR</button>
    <button class="lb" onclick="setLang('ar')">AR</button>
  </div>
  <div class="login-box">
    <h1 id="appTitle">Loup-Garou</h1>
    <p id="appSubtitle">Social Deduction Game</p>
    <div class="fg">
      <label id="nameLabel">Your name</label>
      <input id="inName" type="text" placeholder="e.g., Alex" />
    </div>
    <div class="fg">
      <label id="createOrJoin">Create or join?</label>
      <div style="display:flex;gap:0.6rem">
        <button class="btn" style="flex:1" onclick="doCreate()" id="btnCreate">Create</button>
        <button class="btn btn-secondary" style="flex:1" onclick="doJoin()" id="btnJoin">Join</button>
      </div>
    </div>
    <div class="fg" id="joinCodeBox" style="display:none">
      <label id="roomCodeLabel">Room code</label>
      <input id="inCode" type="text" placeholder="e.g., ABC123" style="text-transform:uppercase" />
    </div>
    <div class="room-code-display" id="createdCodeBox" style="display:none">
      <div style="font-size:.85rem;color:var(--moon-pale);margin-bottom:.5rem" id="copyPrompt">Share this code with others:</div>
      <div class="code" id="roomCodeDisplay"></div>
      <button class="btn-secondary" onclick="copyCodeToClipboard()" style="margin-top:.5rem;width:100%;padding:.5rem" id="copyBtn">Copy Code</button>
      <small id="copyHint"></small>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">
  <div class="g-header">
    <div class="g-title">🐺 <span id="hRoom"></span></div>
    <div class="g-meta">
      <span id="hPlayers">0</span><span id="playerLabel">players</span>
      <span id="hStatus">Setup</span>
      <span id="hPhase">—</span>
    </div>
    <button class="leave-btn" onclick="doLeave()" id="leaveBtn">Leave</button>
  </div>

  <!-- SETUP VIEW -->
  <div id="setupView" class="g-content">
    <div class="left-panel">
      <h3 id="playersTitle">Players</h3>
      <div id="playerStats"></div>
      <div class="role-card">
        <div class="re" id="rEmoji">—</div>
        <div class="rn" id="rName">—</div>
        <div class="rd" id="rDesc">—</div>
      </div>
    </div>

    <div class="center-panel">
      <div class="setup-wrap">
        <h2 id="setupTitle">Setup</h2>

        <div class="s-section">
          <h4 id="timerTitle">Timers</h4>
          <div class="timer-row">
            <div>
              <label id="dayTimerLabel">Day (seconds)</label>
              <input id="cfgDay" type="number" value="60" onchange="cfgChanged()" min="5" max="300" />
            </div>
            <div>
              <label id="nightTimerLabel">Night (seconds)</label>
              <input id="cfgNight" type="number" value="45" onchange="cfgChanged()" min="5" max="300" />
            </div>
          </div>
        </div>

        <div class="s-section">
          <h4 id="rolesTitle">Roles</h4>
          <div class="roles-grid" id="rolesGrid"></div>
        </div>

        <div id="hostStart" style="display:none">
          <div style="padding:0.8rem;background:rgba(16,185,129,.1);border:1px solid var(--green);border-radius:6px;margin-bottom:1rem" id="startHelperMsg"></div>
          <button class="btn" style="width:100%;padding:1rem;font-size:1.05rem" onclick="doStartGame()" id="t_start">Start Game</button>
        </div>

        <div id="guestWait" class="waiting-msg" style="display:none">Waiting for host to start…</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="chat-hdr" id="chatHeader">Chat</div>
      <div id="chatTabs" class="chat-tabs"></div>
      <div id="chatMsgs" class="chat-msgs"></div>
      <div class="chat-inp">
        <input id="chatIn" type="text" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendChat()" />
        <button onclick="sendChat()" id="chatSendBtn">Send</button>
      </div>
    </div>
  </div>

  <!-- PLAY VIEW -->
  <div id="playView" style="display:none" class="g-content">
    <div class="left-panel">
      <h3 id="statsTitle">Stats</h3>
      <div id="playerStats"></div>
      <div class="role-card">
        <div class="re" id="rEmoji">—</div>
        <div class="rn" id="rName">—</div>
        <div class="rd" id="rDesc">—</div>
      </div>
    </div>

    <div class="center-panel">
      <div id="playContent" class="play-wrap"></div>
    </div>

    <div class="right-panel">
      <div class="chat-hdr" id="chatHeader">Chat</div>
      <div id="chatTabs" class="chat-tabs"></div>
      <div id="chatMsgs" class="chat-msgs"></div>
      <div class="chat-inp">
        <input id="chatIn" type="text" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendChat()" />
        <button onclick="sendChat()" id="chatSendBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Death Overlay -->
<div id="deathOverlay">
  <div class="death-card" id="deathCard">
    <h2 id="deathTitle">💀</h2>
    <div class="role" id="deathRole"></div>
    <div class="msg" id="deathMsg"></div>
    <button class="death-card ok-btn" onclick="closeDeathOverlay()">OK</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// TRANSLATIONS
// ════════════════════════════════════════════
let lang='en';
const STRINGS={
  en:{
    appTitle:'Loup-Garou',appSubtitle:'Social Deduction Game',nameLabel:'Your name',createOrJoin:'Create or join?',btnCreate:'Create',btnJoin:'Join',roomCodeLabel:'Room code',copyPrompt:'Share this code with others:',copyBtn:'Copy Code',copyHint:'Code copied!',leaveBtn:'Leave',
    playerLabel:'players',playersTitle:'Players',setupTitle:'Setup',timerTitle:'Timers',dayTimerLabel:'Day (seconds)',nightTimerLabel:'Night (seconds)',rolesTitle:'Roles',chatHeader:'Chat',statsTitle:'Stats',startHelperMsg:'',
    st_setup:'Setup',st_playing:'Playing',ph_night:'Night',ph_day:'Day',t_lplayers:'Living Players',t_mairelabel:'Maire',t_votecount:'Votes:',you:'(You)',generalChat:'General',
    t_dayt:'Day Timer (s)', t_nightt:'Night Timer (s)', t_start:'Start Game',
    d_villager:'A regular townsperson. Vote during the day to eliminate suspects.',
    d_werewolf:'A wolf disguised as human. Kill one villager each night.',
    d_witch:'Can save or kill once per game with magical potions.',
    d_seer:'Can see one player\'s true role each night.',
    d_hunter:'When voted out, can eliminate one player.',
    d_guard:'Protect one player each night from being killed.',
    d_mayor:'Your vote counts twice during elections.',
  },
  fr:{
    appTitle:'Loup-Garou',appSubtitle:'Jeu de Déduction Sociale',nameLabel:'Votre nom',createOrJoin:'Créer ou rejoindre?',btnCreate:'Créer',btnJoin:'Rejoindre',roomCodeLabel:'Code de salle',copyPrompt:'Partagez ce code avec d\'autres:',copyBtn:'Copier le code',copyHint:'Code copié!',leaveBtn:'Quitter',
    playerLabel:'joueurs',playersTitle:'Joueurs',setupTitle:'Configuration',timerTitle:'Chronomètres',dayTimerLabel:'Jour (secondes)',nightTimerLabel:'Nuit (secondes)',rolesTitle:'Rôles',chatHeader:'Chat',statsTitle:'Statistiques',startHelperMsg:'',
    st_setup:'Configuration',st_playing:'Jeu en cours',ph_night:'Nuit',ph_day:'Jour',t_lplayers:'Joueurs en Vie',t_mairelabel:'Maire',t_votecount:'Votes:',you:'(Vous)',generalChat:'Général',
    t_dayt:'Chrono jour (s)', t_nightt:'Chrono nuit (s)', t_start:'Démarrer',
    d_villager:'Un habitant ordinaire. Votez pendant le jour pour éliminer les suspects.',
    d_werewolf:'Un loup déguisé en humain. Tuez un villageois chaque nuit.',
    d_witch:'Peut sauver ou tuer une fois par jeu avec des potions magiques.',
    d_seer:'Peut voir le vrai rôle d\'un joueur chaque nuit.',

    st_setup:'الإعداد',st_playing:'جارٍ الآن',ph_night:'الليل',ph_day:'النهار',t_lplayers:'اللاعبون الأحياء',t_mairelabel:'العمدة',t_votecount:'الأصوات:',you:'(أنت)',generalChat:'عام',
    t_dayt:'مدة النهار (ثا)', t_nightt:'مدة الليل (ثا)', t_start:'ابدأ اللعبة',

    d_mayor:'يتم احتساب صوتك مرتين أثناء الانتخابات.',
  }
};

function doCreate(){
  const n=document.getElementById('inName').value.trim();
  if(!n){ alert(lang==='ar'?'أدخل اسمك':lang==='fr'?'Veuillez entrer votre nom':'Please enter your name'); return; }
  myName=n; myId=Math.random().toString(36).substr(2,9);
  roomCode=(Math.random().toString(36).substr(2,6)).toUpperCase();
  isLeader=true;
  gameState={
    code:roomCode, leader:myId, status:'setup', phase:'setup',
    players:{[myId]:{id:myId,name:myName,alive:true,role:null,joinedAt:Date.now()}},
    config:cfg, chat:[], createdAt:Date.now()
  };
  if(fbOk&&db){
    db.ref(`games/${roomCode}`).set(gameState);
    db.ref(`games/${roomCode}`).on('value',snap=>{
      const data=snap.val();
      if(data) Object.assign(gameState,data);
      renderGame();
    });
  }
  document.getElementById('roomCodeDisplay').textContent=roomCode;
  document.getElementById('createdCodeBox').style.display='block';
  showGame();
  renderGame();
}

function doJoin(){
  const n=document.getElementById('inName').value.trim();
  const c=document.getElementById('inCode').value.trim().toUpperCase();
  if(!n||!c){ alert(lang==='ar'?'أدخل الاسم والرمز':lang==='fr'?'Entrez le nom et le code':'Enter name and code'); return; }
  myName=n; myId=Math.random().toString(36).substr(2,9); roomCode=c; isLeader=false;
  if(fbOk&&db){
    db.ref(`games/${roomCode}`).once('value',snap=>{
      if(!snap.exists()){ alert('Invalid code'); return; }
      gameState=snap.val();
      gameState.players[myId]={id:myId,name:myName,alive:true,role:null,joinedAt:Date.now()};
      db.ref(`games/${roomCode}/players/${myId}`).set(gameState.players[myId]);
      db.ref(`games/${roomCode}`).on('value',snap=>{
        const data=snap.val();
        if(data) Object.assign(gameState,data);
        renderGame();
      });
      showGame();
      renderGame();
    });
  } else {
    alert('Firebase not available'); return;
  }
}

// START - FIXED BUTTON LOGIC
// ════════════════════════════════════════════
function doStartGame(){
  // Robust leader check: use both local flag and Firebase data
  const amLeader = isLeader || (gameState?.leader === myId);
  if(!amLeader){ console.warn('❌ Not leader, cannot start'); alert('Only the party leader can start the game'); return; }
  
  const players = gameState?.players ? Object.values(gameState.players) : [];
  const n = players.length;
  
  if(n < 2){
    alert(lang==='ar'?'تحتاج لاعبَين على الأقل':lang==='fr'?'Minimum 2 joueurs':'Need at least 2 players');
    return;
  }
  
  if(!cfg.roleCounts) cfg.roleCounts={};
  const _wc = cfg.roleCounts.werewolf ?? 1;
  if(_wc >= n){
    alert(lang==='ar'?'عدد الذئاب أكثر من اللاعبين!':lang==='fr'?'Trop de loups !':'Too many wolves for the player count!');
    return;
  }
  
  isLeader = true;
  const roles = assignRoles(n);
  
  if(fbOk && db && roomCode){
    const upd = {};
    players.forEach((p, i) => { 
      upd[`games/${roomCode}/players/${p.id}/role`] = roles[i]; 
    });
    upd[`games/${roomCode}/status`] = 'playing';
    upd[`games/${roomCode}/phase`] = 'night';
    upd[`games/${roomCode}/phaseStart`] = Date.now();
    upd[`games/${roomCode}/dayNum`] = 1;
    upd[`games/${roomCode}/witchPotions`] = null;
    
    players.forEach((p, i) => {
      if(roles[i] === 'witch') upd[`games/${roomCode}/witchPotions/${p.id}`] = {life:true, death:true};
    });
    
    upd[`games/${roomCode}/nightTurn`] = {stepId:'__init__', stepIndex:-1, turnStart:Date.now()};
    upd[`games/${roomCode}/nightActions`] = null;
    upd[`games/${roomCode}/dayVotes`] = null;
    
    db.ref().update(upd).then(() => {
      console.log('✅ Game started successfully');
      _lastStepId = null;
      _advancingStep = false;
      setTimeout(() => { if(isLeader) advanceNightTurn(0); }, 600);
    }).catch(err => {
      console.error('❌ Start game error:', err);
      alert('⚠️ Error starting game: ' + err.message);
    });
  } else {
    players.forEach((p, i) => { gameState.players[p.id].role = roles[i]; });
    gameState.witchPotions = {};
    players.forEach((p, i) => {
      if(roles[i] === 'witch') gameState.witchPotions[p.id] = {life:true, death:true};
    });
    Object.assign(gameState, {
      status:'playing', phase:'night', phaseStart:Date.now(), dayNum:1,
      nightTurn:{stepId:'__init__', stepIndex:-1, turnStart:Date.now()},
      nightActions:null, dayVotes:null
    });
    _lastStepId = null;
    _advancingStep = false;
    renderGame();
    setTimeout(() => advanceNightTurn(0), 600);
  }
}

// ════════════════════════════════════════════
function renderGame(){
  if(!gameState) return;
  const players = gameState.players ? Object.values(gameState.players) : [];
  document.getElementById('hPlayers').textContent = players.length;
  document.getElementById('hRoom').textContent = roomCode || '';

  if(gameState.status === 'setup'){
    document.getElementById('setupView').style.display = 'block';
    document.getElementById('playView').style.display = 'none';
    document.getElementById('hStatus').textContent = tr('st_setup');
    document.getElementById('hPhase').textContent = '—';
    
    // **CRITICAL FIX: Proper leader check**
    const amLeader = isLeader || (gameState?.leader === myId);
    if(amLeader) isLeader = true;
    
    // Show start button ONLY for leader
    document.getElementById('hostStart').style.display = amLeader ? 'block' : 'none';
    document.getElementById('guestWait').style.display = amLeader ? 'none' : 'block';
    
    // Sync config inputs for non-leaders
    if(gameState.config){
      const c = gameState.config;
      document.getElementById('cfgDay').value = c.dayTimer || 60;
      document.getElementById('cfgNight').value = c.nightTimer || 45;
      if(c.roleCounts){ if(!cfg.roleCounts) cfg.roleCounts = {}; Object.assign(cfg.roleCounts, c.roleCounts); }
    }
    
    // disable/enable inputs for guests
    ['cfgDay', 'cfgNight'].forEach(id => {
      document.getElementById(id).disabled = !isLeader;
    });
    
    buildRolesGrid();
    renderStats(players);
    
    // Helper message
    const _helperEl = document.getElementById('startHelperMsg');
    if(_helperEl && isLeader){
      if(!cfg.roleCounts) cfg.roleCounts = {};
      const _wc = cfg.roleCounts.werewolf ?? 1;
      const _vc = cfg.roleCounts.villager ?? 1;
      let _cr = cfg.roles; 
      if(!Array.isArray(_cr)) _cr = _cr ? Object.values(_cr) : [];
      const _WR = ['werewolf','bigbadwolf','alphawolf','wolffather','corruptedbutcher','whitewerewolf'];
      const _sr = _cr.filter(r => r !== 'werewolf' && r !== 'villager' && !_WR.includes(r));
      let _st = 0; 
      _sr.forEach(r => { _st += (r === 'threebrothers' ? 3 : r === 'twosisters' ? 2 : 1); });
      const _total = _wc + _st + _vc;
      const _conn = players.length;
      const _ok = _total === _conn;
      _helperEl.style.background = _ok ? 'rgba(16,185,129,.15)' : 'rgba(212,160,23,.12)';
      _helperEl.style.border = _ok ? '1px solid var(--green)' : '1px solid var(--moon)';
      _helperEl.style.color = _ok ? 'var(--green)' : 'var(--moon-pale)';
      _helperEl.innerHTML = _ok
        ? `✅ ${_conn} ${lang === 'ar' ? 'لاعبين — جاهز للبدء!' : lang === 'fr' ? 'joueurs — prêt à démarrer !' : 'players ready — good to go!'}`
        : `${lang === 'ar' ? 'إجمالي الأدوار' : lang === 'fr' ? 'Total rôles' : 'Total roles'}: <strong>${_total}</strong> &nbsp;·&nbsp; ${lang === 'ar' ? 'متصلون' : lang === 'fr' ? 'Connectés' : 'Connected'}: <strong>${_conn}</strong>`;
    }
  } else if(gameState.status === 'playing'){
    document.getElementById('setupView').style.display = 'none';
    document.getElementById('playView').style.display = 'flex';
    document.getElementById('hStatus').textContent = tr('st_playing');
    document.getElementById('hPhase').textContent = gameState.phase === 'night' ? tr('ph_night') : tr('ph_day');

    // Initialize alive tracking on first render
    if(Object.keys(_previousAlive).length === 0){
      players.forEach(p => { _previousAlive[p.id] = p.alive; });
    }

    checkForDeaths(players);
    const winResult = checkWinCondition();
    if(winResult){
      showGameOver(winResult);
      renderChat();
      applyTranslations();
      return;
    }

    const me = gameState.players?.[myId];
    if(me?.role){
      myRole = me.role;
      const rd = ROLES_DEF[myRole];
      document.getElementById('rEmoji').textContent = rd?.e || '❓';
      document.getElementById('rName').textContent = tr(myRole);
      document.getElementById('rDesc').textContent = tr('d_' + myRole);
    }
    renderPlayerList(players);
    renderStats(players);
    renderPhase();
    startTimerIfNeeded();
    
    // Leader checks
    if(isLeader){
      if(gameState.phase === 'night') checkTurnComplete();
      else if(gameState.phase === 'day') checkDayVoteComplete();
    }
  }
  renderChat();
  applyTranslations();
}

function renderStats(players){
  const alive = players.filter(p => p.alive);
  const dead = players.filter(p => !p.alive);
  document.getElementById('iAlive').textContent = alive.length;
  document.getElementById('iDead').textContent = dead.length;
  if(gameState.status === 'playing'){
    document.getElementById('iWolves').textContent = alive.filter(p => ROLES_DEF[p.role]?.team === 'werewolf').length;
    document.getElementById('iVillage').textContent = alive.filter(p => ROLES_DEF[p.role]?.team !== 'werewolf').length;
  }
}

  el.innerHTML = `<div style="color:var(--moon);font-family:'Cinzel',serif;font-size:.9rem;margin-bottom:.6rem">${tr('t_lplayers')}</div>` +

      return `

        ${p.id === myId ? `<span style="color:var(--moon);font-size:.75rem;font-weight:700">${tr('you')}</span>` : ''}
      </div>`;
    }).join('');
}

function assignRoles(n){
  const roles = [];
  if(!cfg.roleCounts) cfg.roleCounts = {};
  const wc = cfg.roleCounts.werewolf ?? 1;
  const vc = cfg.roleCounts.villager ?? 1;
  for(let i = 0; i < wc && roles.length < n; i++) roles.push('werewolf');
  for(let i = 0; i < vc && roles.length < n; i++) roles.push('villager');
  while(roles.length < n) roles.push('villager');
  return roles.sort(() => Math.random() - 0.5);
}

function buildRolesGrid(){
  const el = document.getElementById('rolesGrid');
  if(!el) return;
  el.innerHTML = ROLE_DEFAULTS.map((r, idx) => {
    const chk = cfg.roles && cfg.roles.includes(r.id);
    return `
    <label class="rc t-${r.team}">
      <input type="checkbox" ${chk ? 'checked' : ''} onchange="toggleRole('${r.id}')" />
      <span class="rc-emoji">${r.emoji}</span>
      <span>${lang === 'ar' ? r.label_ar : lang === 'fr' ? r.label_fr : r.label_en}</span>
    </label>`;
  }).join('');
}

function toggleRole(rid){
  if(!cfg.roles) cfg.roles = [];
  if(!Array.isArray(cfg.roles)) cfg.roles = Object.values(cfg.roles);
  if(cfg.roles.includes(rid)) cfg.roles = cfg.roles.filter(r => r !== rid);
  else cfg.roles.push(rid);
  updateRolePreview();
  pushCfg();
}

function pushCfg(){
  if(fbOk && db && roomCode){
    db.ref(`games/${roomCode}/config`).set(cfg);
  }
}
